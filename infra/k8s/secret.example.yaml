# TEMPLATE ONLY — copy to secret.yaml (gitignored) or, better, manage with
# SealedSecrets / ExternalSecrets. Every value here is required by the API's
# production startup guard or a feature module.
apiVersion: v1
kind: Secret
metadata:
  name: cf-secrets
  namespace: creatorforce
type: Opaque
stringData:
  DATABASE_URL: "postgresql://cf:CHANGE_ME@postgres:5432/creatorforce"
  # >=32 chars, unique per environment — the API refuses to boot otherwise
  JWT_SECRET: "CHANGE_ME_generate_openssl_rand_hex_32"
  # exactly 64 hex chars: node -e "console.log(require('crypto').randomBytes(32).toString('hex'))"
  TOKEN_ENCRYPTION_KEY: "CHANGE_ME_64_hex_chars"
  ANTHROPIC_API_KEY: ""
  OPENAI_API_KEY: ""
  GEMINI_API_KEY: ""
  YOUTUBE_API_KEY: ""
  GOOGLE_CLIENT_ID: ""
  GOOGLE_CLIENT_SECRET: ""
  STRIPE_SECRET_KEY: ""
  STRIPE_WEBHOOK_SECRET: ""
  SENTRY_DSN: ""
