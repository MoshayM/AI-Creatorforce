apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: creatorforce
spec:
  selector:
    app: web
  ports:
    - port: 3007
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: creatorforce
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - name: web
          image: creatorforce/web:latest
          ports:
            - containerPort: 3007
          env:
            - name: NODE_ENV
              value: production
          livenessProbe:
            httpGet: { path: /, port: 3007 }
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet: { path: /, port: 3007 }
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests: { cpu: 250m, memory: 512Mi }
            limits: { cpu: "2", memory: 2Gi }
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
