global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'creatorforce-api'
    # On Linux hosts set host.docker.internal via --add-host flag or use the
    # container's bridge IP. On Docker Desktop (Mac/Windows) host.docker.internal
    # resolves automatically.
    static_configs:
      - targets: ['host.docker.internal:4007']
    metrics_path: /metrics
    scheme: http
    # Uncomment and set METRICS_TOKEN in .env when the token guard is enabled:
    # authorization:
    #   credentials: <METRICS_TOKEN value>
