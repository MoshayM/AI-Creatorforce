name: CI

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# pnpm version comes from package.json's packageManager field (pnpm@11.x) —
# pnpm/action-setup reads it; pinning it here too made the action error out.
# Node 24 to match local dev; pnpm 11.x requires Node >= 22.13.
env:
  NODE_VERSION: '24'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared packages
        run: pnpm --filter @cf/tsconfig --filter @cf/eslint-config --filter @cf/shared build

      - name: Lint
        run: pnpm lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # @prisma/client's postinstall only writes a stub — the real client
      # (UserRole, PricingRule, …) comes from generating against the schema.
      - name: Generate Prisma client
        run: pnpm --filter @cf/api exec prisma generate

      - name: Build shared packages
        run: pnpm --filter @cf/tsconfig --filter @cf/shared build

      - name: Typecheck
        run: pnpm typecheck

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @cf/api exec prisma generate

      - name: Build shared packages
        run: pnpm --filter @cf/tsconfig --filter @cf/shared build

      - name: Run unit tests with coverage
        run: pnpm --filter @cf/api test -- --coverage --ci

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: apps/api/coverage/
          retention-days: 7

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck, unit-tests]
    env:
      SKIP_ENV_VALIDATION: 'true'
      NEXT_TELEMETRY_DISABLED: '1'
      # Stub values so Next.js build doesn't fail on missing env vars
      NEXT_PUBLIC_API_URL: 'http://localhost:4001/api/v1'
      NEXT_PUBLIC_USE_MOCK: 'false'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @cf/api exec prisma generate

      - name: Build all packages and apps
        run: pnpm build
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

      # Performance budget gate (docs4/44): per-route first-load JS ≤ 800 KB
      # raw, total unique JS ≤ 1500 KB. Baseline 2026-07: 571 KB / 1001 KB.
      # Also diffs against scripts/bundle-budget-baseline.json (trend WARNs).
      - name: Check bundle budget
        run: node scripts/check-bundle-budget.mjs
        working-directory: apps/web

      # Trend artifact (docs4/44): per-route sizes for this run, kept 90 days
      # so budget creep is inspectable across builds, not just pass/fail.
      - name: Upload bundle budget report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bundle-budget-report
          path: apps/web/.next/bundle-budget-report.json
          if-no-files-found: ignore

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit dependencies for high/critical CVEs
        run: pnpm audit --audit-level=high
        continue-on-error: true

      - name: Dependency review (PR only)
        if: github.event_name == 'pull_request'
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Gate: custom architecture rules at ERROR severity must pass.
      # No --quiet on the scan: it swallowed the reason for config errors
      # (the job failed with a bare exit 7 and nothing in the log).
      - name: Run custom rules (blocking)
        run: |
          pip install semgrep --quiet
          semgrep --version
          semgrep scan \
            --config .semgrep/ \
            --error \
            --severity ERROR
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      # Informational: TypeScript registry pack — findings don't block the build.
      - name: Run registry pack (informational)
        run: |
          semgrep scan \
            --config p/typescript \
            --quiet
        continue-on-error: true
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

  # DAST baseline (docs4/23): spider + passive scan of the production web
  # build on every PR/push. High-risk findings fail the job (severity gate in
  # .zap/check-zap-summary.mjs); Medium and below are reported in the artifact.
  # The web app runs without the API — passive scanning only inspects
  # responses/headers, so client-side fetch failures don't affect findings.
  zap-baseline:
    name: ZAP Baseline (DAST)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SKIP_ENV_VALIDATION: 'true'
      NEXT_TELEMETRY_DISABLED: '1'
      NEXT_PUBLIC_API_URL: 'http://localhost:4007/api/v1'
      NEXT_PUBLIC_USE_MOCK: 'false'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web app (with workspace deps)
        run: pnpm --filter @cf/web... build

      - name: Start web app in background
        run: |
          pnpm --filter @cf/web exec next start -p 3007 &
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3007/login > /dev/null 2>&1; then
              echo "Web is up"; break
            fi
            echo "Waiting for web... ($i/30)"
            sleep 1
          done

      - name: Run ZAP baseline scan
        run: |
          chmod a+w .zap
          docker run --network host -v "$PWD/.zap:/zap/wrk" \
            ghcr.io/zaproxy/zaproxy:stable \
            zap.sh -cmd -silent -autorun /zap/wrk/plan.yaml

      - name: Gate on High-risk findings
        run: node .zap/check-zap-summary.mjs .zap/zap-baseline-web.json

      - name: Upload ZAP report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-baseline-report
          path: |
            .zap/zap-baseline-web.md
            .zap/zap-baseline-web.json
            .zap/zap-summary.json
          retention-days: 30

  e2e:
    name: E2E Tests (Playwright, ${{ matrix.browser }})
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: [lint, typecheck, unit-tests]
    # Cross-browser sharding (docs4/22): one job per browser keeps each run
    # inside the timeout instead of tripling a single job.
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: cf
          POSTGRES_PASSWORD: cf
          POSTGRES_DB: creatorforce
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://cf:cf@localhost:5432/creatorforce
      # BullModule is hardcoded to 127.0.0.1:6379 in app.module.ts; service maps to that.
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-secret-e2e
      API_PORT: '4007'
      NODE_ENV: production
      # Silence optional external integrations so the API starts without real keys.
      SKIP_ENV_VALIDATION: 'true'
      ANTHROPIC_API_KEY: ci-placeholder
      OPENAI_API_KEY: ci-placeholder
      GEMINI_API_KEY: ci-placeholder

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared packages
        run: pnpm --filter @cf/tsconfig --filter @cf/eslint-config --filter @cf/shared build

      - name: Generate Prisma client
        run: pnpm --filter @cf/api exec prisma generate
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}

      - name: Run database migrations
        run: pnpm --filter @cf/api exec prisma migrate deploy
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}

      - name: Build API
        run: pnpm --filter @cf/api build

      - name: Start API in background
        run: |
          node apps/api/dist/main.js &
          # Wait until the API health endpoint responds (up to 30s)
          for i in $(seq 1 30); do
            if curl -sf http://localhost:4007/api/v1 > /dev/null 2>&1 || \
               curl -sf http://localhost:4007/api/docs > /dev/null 2>&1; then
              echo "API is up"; break
            fi
            echo "Waiting for API... ($i/30)"
            sleep 1
          done
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          JWT_SECRET: ${{ env.JWT_SECRET }}
          API_PORT: ${{ env.API_PORT }}
          NODE_ENV: ${{ env.NODE_ENV }}
          ANTHROPIC_API_KEY: ${{ env.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ env.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ env.GEMINI_API_KEY }}

      - name: Install Playwright browsers
        run: pnpm --filter @cf/e2e exec playwright install --with-deps ${{ matrix.browser }}

      - name: Run Playwright E2E tests
        run: pnpm --filter @cf/e2e exec playwright test --project=${{ matrix.browser }}
        env:
          CI: 'true'
          # playwright.config.ts webServer block hardcodes NEXT_PUBLIC_API_URL=http://localhost:4007/api/v1
          # and starts the Next.js dev server via 'pnpm --filter @cf/web dev' automatically.
          NEXT_PUBLIC_API_URL: 'http://localhost:4007/api/v1'
          NEXT_PUBLIC_USE_MOCK: 'false'
          SKIP_ENV_VALIDATION: 'true'

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report-${{ matrix.browser }}
          path: apps/e2e/playwright-report/
          retention-days: 7
